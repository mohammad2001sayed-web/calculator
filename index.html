<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="./css/all.min.css" />
    <link rel="stylesheet" href="./css/bootstrap.min.css" />
    <link rel="stylesheet" href="./css/style.css" />
  </head>
  <body>
    <section class="claculator py-5 mx-auto bg-dark pt-3 mt-5">
      <div class="container">
        <div class="row text-center g-2">
          <div class="col-12">
            <input
              id="display"
              type="text"
              class="form-control my-2"
              placeholder="0"
            />
            <div>
              <div class="row g-2">
                <div class="col-3">
                  <button
                    class="operator btn btn-warning"
                    onclick="appendDisplay('+')"
                  >
                    +
                  </button>
                </div>
                <div class="col-3">
                  <button class="btn btn-primary" onclick="appendDisplay('8')">
                    8
                  </button>
                </div>
                <div class="col-3">
                  <button class="btn btn-primary" onclick="appendDisplay('9')">
                    9
                  </button>
                </div>
                <div class="col-3">
                  <button class="btn btn-primary" onclick="appendDisplay('7')">
                    7
                  </button>
                </div>

                <div class="col-3">
                  <button class="btn btn-warning" onclick="appendDisplay('-')">
                    -
                  </button>
                </div>
                <div class="col-3">
                  <button class="btn btn-primary" onclick="appendDisplay('4')">
                    4
                  </button>
                </div>
                <div class="col-3">
                  <button class="btn btn-primary" onclick="appendDisplay('5')">
                    5
                  </button>
                </div>
                <div class="col-3">
                  <button class="btn btn-primary" onclick="appendDisplay('6')">
                    6
                  </button>
                </div>
                <div class="col-3">
                  <button class="btn btn-warning" onclick="appendDisplay('*')">
                    *
                  </button>
                </div>

                <div class="col-3">
                  <button class="btn btn-primary" onclick="appendDisplay('1')">
                    1
                  </button>
                </div>

                <div class="col-3">
                  <button class="btn btn-primary" onclick="appendDisplay('2')">
                    2
                  </button>
                </div>

                <div class="col-3">
                  <button class="btn btn-primary" onclick="appendDisplay('3')">
                    3
                  </button>
                </div>
                <div class="col-3">
                  <button class="btn btn-warning" onclick="appendDisplay('/')">
                    /
                  </button>
                </div>
                <div class="col-3">
                  <button class="btn btn-primary" onclick="appendDisplay('0')">
                    0
                  </button>
                </div>
                <div class="col-3">
                  <button class="btn btn-primary" onclick="appendDisplay('.')">
                    .
                  </button>
                </div>
                <div class="col-3 p-0">
                  <button
                    class="btn btn-light d-flex align-items-center justify-content-center"
                    onclick="del()"
                  >
                    <i class="fa-solid fa-delete-left"></i>
                  </button>
                </div>
                <div class="col-6">
                  <button class="btn bg-success" onclick="calcu()"><i class="fa-solid fa-equals"></i></button>
                </div>
                <div class="col-6">
                  <button class="btn btn-danger" onclick="delall()">C</button>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </section>

    <script src="./js/bootstrap.bundle.min.js"></script>
    <script src="./js/main.js"></script>
  </body>
</html>
